<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITOPIA | Yönetim Paneli v2.0 (Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        h1, h2, h3, .nav-item { font-family: 'Space Grotesk', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        .tab-active { background-color: #10b981 !important; color: white !important; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .interactivity-star { color: #f59e0b; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        @media print { .no-print { display: none !important; } body { background: white; } .glass-card { box-shadow: none; border: 1px solid #eee; } }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 700; text-transform: uppercase; }
        .loading-overlay { position: fixed; inset: 0; background: white; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body class="antialiased">

    <!-- Yükleme Ekranı -->
    <div id="loading" class="loading-overlay">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-slate-500 uppercase tracking-widest text-xs">Bulut Verileri Senkronize Ediliyor...</p>
    </div>

    <!-- Navigasyon -->
    <nav class="no-print bg-white/70 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                    <i class="fas fa-leaf text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900 leading-none">DIGI<span class="text-emerald-600">TOPIA</span></h1>
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">Live Sync Management</span>
                </div>
            </div>
            
            <div class="hidden lg:flex items-center gap-6">
                <button onclick="openModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition flex items-center gap-2 shadow-lg shadow-emerald-100">
                    <i class="fas fa-plus"></i> Yeni Etkinlik
                </button>
                <button onclick="downloadPDF()" class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition flex items-center gap-2">
                    <i class="fas fa-file-pdf"></i> PDF İndir
                </button>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-bold text-slate-900">BULUT PANELİ</p>
                    <p class="text-[10px] text-emerald-600 font-bold uppercase" id="connection-status">Bağlı</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Admin+Sync&background=059669&color=fff" alt="Avatar">
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto px-6 py-8">
        
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10 no-print">
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Toplam Etkinlik</p>
                <h3 class="text-3xl font-bold text-slate-900" id="stat-total">0 Seans</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl border-l-4 border-l-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Silinen Toplam Veri</p>
                <div class="flex items-center gap-3">
                    <h3 class="text-3xl font-bold text-blue-600" id="stat-data">...</h3>
                    <button onclick="editStat('data', 'Silinen Veri (GB)')" class="text-slate-300 hover:text-blue-500 transition"><i class="fas fa-edit text-xs"></i></button>
                </div>
            </div>
            <div class="glass-card p-6 rounded-3xl border-l-4 border-l-emerald-500">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Üretilen UNO Kartları</p>
                <div class="flex items-center gap-3">
                    <h3 class="text-3xl font-bold text-emerald-600" id="stat-cards">...</h3>
                    <button onclick="editStat('cards', 'Kart Sayısı')" class="text-slate-300 hover:text-emerald-500 transition"><i class="fas fa-edit text-xs"></i></button>
                </div>
            </div>
            <div class="glass-card p-6 rounded-3xl border-l-4 border-l-amber-500">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Proje Durumu</p>
                <h3 class="text-3xl font-bold text-amber-600 uppercase italic">Canlı Yayında</h3>
            </div>
        </div>

        <!-- Filtreler ve Arama -->
        <div class="flex flex-col lg:flex-row justify-between items-center gap-4 mb-8 no-print">
            <div id="tabs" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="filterDay('all')" class="day-tab px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-bold transition hover:border-emerald-500 tab-active">TÜMÜ</button>
                <button onclick="filterDay('2')" class="day-tab px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-bold">GÜN 2</button>
                <button onclick="filterDay('3')" class="day-tab px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-bold">GÜN 3</button>
                <button onclick="filterDay('5')" class="day-tab px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-bold">GÜN 5</button>
                <button onclick="filterDay('6')" class="day-tab px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-bold">GÜN 6</button>
                <button onclick="filterDay('7')" class="day-tab px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-600 text-sm font-bold">GÜN 7</button>
            </div>
            <div class="relative w-full lg:w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Etkinlik veya sorumlu ara..." class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition">
            </div>
        </div>

        <!-- Tablo -->
        <div id="pdf-content" class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-[11px] font-bold uppercase tracking-widest border-b border-slate-200">
                            <th class="px-6 py-5 text-left">Zamanlama</th>
                            <th class="px-6 py-5 text-left">Etkinlik</th>
                            <th class="px-6 py-5 text-left">Sorumlu</th>
                            <th class="px-6 py-5 text-left">Metodoloji & Süreç</th>
                            <th class="px-6 py-5 text-left">Kazanım</th>
                            <th class="px-6 py-5 text-center">İnteraktiflik</th>
                            <th class="px-6 py-5 text-right no-print">İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Bulut verisi ile dolacak -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- EDİTÖR MODAL -->
    <div id="editModal" class="modal">
        <div class="bg-white rounded-[2rem] w-full max-w-xl p-10 shadow-2xl mx-4">
            <div class="flex justify-between items-center mb-8 border-b pb-5">
                <h3 class="text-2xl font-bold text-slate-900" id="modalTitle">Etkinlik Düzenle</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition text-2xl"><i class="fas fa-times"></i></button>
            </div>
            <form id="activityForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">GÜN</label>
                        <select id="formDay" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm">
                            <option value="2">Gün 2</option>
                            <option value="3">Gün 3</option>
                            <option value="5">Gün 5</option>
                            <option value="6">Gün 6</option>
                            <option value="7">Gün 7</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">SAAT</label>
                        <input type="text" id="formTime" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm" placeholder="Örn: 10:30">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">ETKİNLİK ADI</label>
                    <input type="text" id="formName" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">SORUMLU</label>
                        <input type="text" id="formLead" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">İNTERAKTİFLİK (1-5)</label>
                        <input type="number" id="formInteract" min="1" max="5" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">SÜREÇ DETAYI</label>
                    <textarea id="formProcess" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm h-20"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition">İptal</button>
                    <button type="submit" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold hover:bg-emerald-700 transition shadow-xl">Buluta Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Config
        const SUPABASE_URL = 'https://mctofxmujwluexoqvlza.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VX-r5hO9PEcq2d4dsCrY7A_H4UBlOwF';

        // Create Supabase client
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        let activities = [];
        let stats = { data: "42.8 GB", cards: "124" };
        let currentFilter = 'all';
        let isOnline = true;

        // --- YEREL DEPOLAMA (localStorage) ---
        const storage = {
            getActivities: () => JSON.parse(localStorage.getItem('digitopia_activities') || '[]'),
            setActivities: (data) => localStorage.setItem('digitopia_activities', JSON.stringify(data)),
            getStats: () => JSON.parse(localStorage.getItem('digitopia_stats') || '{"data":"42.8 GB","cards":"124"}'),
            setStats: (data) => localStorage.setItem('digitopia_stats', JSON.stringify(data))
        };

        // --- INITIALIZATION ---
        const init = async () => {
            try {
                // Önce localStorage'dan yükle
                activities = storage.getActivities();
                stats = storage.getStats();
                updateUI();

                // Sonra Supabase'den senkronize et
                await syncFromSupabase();
                
                // Real-time listener başlat
                startRealtimeListener();
                
                isOnline = true;
                updateConnectionStatus();
            } catch (err) {
                console.error("Init error:", err);
                isOnline = false;
                updateConnectionStatus();
            }

            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        };

        // --- SUPABASE SYNC ---
        const syncFromSupabase = async () => {
            try {
                // Activities yükle
                const { data: activitiesData, error: activitiesError } = await supabase
                    .from('activities')
                    .select('*');
                
                if (activitiesError) throw activitiesError;
                
                if (activitiesData && activitiesData.length > 0) {
                    activities = activitiesData.map(a => ({ 
                        id: a.id, 
                        day: a.day, 
                        time: a.time, 
                        name: a.name, 
                        lead: a.lead, 
                        interact: a.interact, 
                        process: a.process,
                        goal: a.goal,
                        method: a.method,
                        duration: a.duration
                    }));
                    storage.setActivities(activities);
                    activities.sort((a, b) => a.day - b.day || a.time.localeCompare(b.time));
                }

                // Stats yükle
                const { data: statsData, error: statsError } = await supabase
                    .from('stats')
                    .select('*')
                    .limit(1);
                
                if (statsError && statsError.code !== 'PGRST116') throw statsError;
                
                if (statsData && statsData.length > 0) {
                    stats = { data: statsData[0].data, cards: statsData[0].cards };
                    storage.setStats(stats);
                }

                updateUI();
            } catch (err) {
                console.error("Supabase sync error:", err);
                // localStorage'dan devam et
            }
        };

        // --- REAL-TIME LISTENER ---
        const startRealtimeListener = () => {
            // Activities listener
            supabase
                .channel('public:activities')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'activities' }, (payload) => {
                    console.log('Activity change:', payload);
                    syncFromSupabase();
                })
                .subscribe();

            // Stats listener
            supabase
                .channel('public:stats')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'stats' }, (payload) => {
                    console.log('Stats change:', payload);
                    syncFromSupabase();
                })
                .subscribe();
        };

        // --- UPDATE UI ---
        const updateUI = () => {
            renderTable();
            document.getElementById('stat-data').innerText = stats.data;
            document.getElementById('stat-cards').innerText = stats.cards;
            document.getElementById('stat-total').innerText = activities.length + " Seans";
        };

        // --- CONNECTION STATUS ---
        const updateConnectionStatus = () => {
            const status = document.getElementById('connection-status');
            if (isOnline) {
                status.innerText = 'Bağlı ✓';
                status.className = 'text-[10px] text-emerald-600 font-bold uppercase';
            } else {
                status.innerText = 'Çevrimdışı';
                status.className = 'text-[10px] text-red-600 font-bold uppercase';
            }
        };

        // Network detection
        window.addEventListener('online', () => { isOnline = true; updateConnectionStatus(); syncFromSupabase(); });
        window.addEventListener('offline', () => { isOnline = false; updateConnectionStatus(); });

        init();

        // --- UI FUNCTIONS ---
        window.renderTable = function(data = null) {
            const displayData = data || (currentFilter === 'all' ? activities : activities.filter(a => a.day.toString() === currentFilter));
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            document.getElementById('stat-total').innerText = activities.length + " Seans";

            displayData.forEach((act) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50 transition-colors group";
                tr.innerHTML = `
                    <td class="px-6 py-5">
                        <div class="flex flex-col">
                            <span class="text-emerald-600 font-bold text-[10px] uppercase tracking-wider">Gün ${act.day}</span>
                            <span class="text-slate-900 font-bold text-sm">${act.time}</span>
                        </div>
                    </td>
                    <td class="px-6 py-5">
                        <p class="font-bold text-slate-800 text-sm mb-1">${act.name}</p>
                        <span class="status-badge bg-emerald-100 text-emerald-700">Canlı</span>
                    </td>
                    <td class="px-6 py-5 font-semibold text-slate-700 text-sm">${act.lead}</td>
                    <td class="px-6 py-5">
                        <p class="text-[11px] text-slate-500 leading-relaxed max-w-[250px]">${act.process}</p>
                    </td>
                    <td class="px-6 py-5 text-[11px] text-slate-600 font-medium">${act.goal || 'Belirlenmedi'}</td>
                    <td class="px-6 py-5 text-center">
                        <div class="flex justify-center gap-0.5">${Array(5).fill(0).map((_, i) => `<i class="fas fa-star text-[10px] ${i < act.interact ? 'interactivity-star' : 'text-slate-200'}"></i>`).join('')}</div>
                    </td>
                    <td class="px-6 py-5 text-right no-print">
                        <div class="flex justify-end gap-2">
                            <button onclick="editActivity('${act.id}')" class="p-2 text-slate-400 hover:text-emerald-600 transition"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteActivity('${act.id}')" class="p-2 text-slate-400 hover:text-red-500 transition"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.openModal = () => {
            document.getElementById('activityForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('modalTitle').innerText = "Buluta Yeni Etkinlik Ekle";
            document.getElementById('editModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('editModal').classList.remove('active');

        window.editActivity = (id) => {
            const act = activities.find(a => a.id === id);
            if (!act) return;
            document.getElementById('editId').value = id;
            document.getElementById('formDay').value = act.day;
            document.getElementById('formTime').value = act.time;
            document.getElementById('formName').value = act.name;
            document.getElementById('formLead').value = act.lead;
            document.getElementById('formInteract').value = act.interact;
            document.getElementById('formProcess').value = act.process;
            document.getElementById('modalTitle').innerText = "Bulut Verisini Düzenle";
            document.getElementById('editModal').classList.add('active');
        };

        document.getElementById('activityForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value || crypto.randomUUID();
            const data = {
                id: id,
                day: parseInt(document.getElementById('formDay').value),
                time: document.getElementById('formTime').value,
                name: document.getElementById('formName').value,
                lead: document.getElementById('formLead').value,
                interact: parseInt(document.getElementById('formInteract').value),
                process: document.getElementById('formProcess').value,
                goal: "",
                method: "Sync Method",
                duration: "Managed"
            };

            try {
                // UPSERT - Güncelle veya ekle
                const { error } = await supabase
                    .from('activities')
                    .upsert(data, { onConflict: 'id' });
                
                if (error) {
                    console.error('Supabase error:', error);
                    throw error;
                }

                // localStorage da güncelle
                const idx = activities.findIndex(a => a.id === id);
                if (idx >= 0) {
                    activities[idx] = data;
                } else {
                    activities.push(data);
                }
                activities.sort((a, b) => a.day - b.day || a.time.localeCompare(b.time));
                storage.setActivities(activities);
                updateUI();
                closeModal();
            } catch (err) {
                alert('Hata: ' + err.message);
            }
        };

        window.deleteActivity = async (id) => {
            if (!confirm('Bu etkinlik silinsin mi?')) return;

            try {
                const { error } = await supabase
                    .from('activities')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                // localStorage dan sil
                activities = activities.filter(a => a.id !== id);
                storage.setActivities(activities);
                updateUI();
            } catch (err) {
                alert('Hata: ' + err.message);
            }
        };

        window.editStat = async (field, label) => {
            const current = stats[field];
            const newVal = prompt(`${label} yeni değerini girin:`, current);
            if (newVal === null) return;

            try {
                const newStats = { ...stats, [field]: newVal };

                // Supabase'de güncelle
                const { error } = await supabase
                    .from('stats')
                    .upsert({ id: 1, ...newStats }, { onConflict: 'id' });

                if (error) throw error;

                // localStorage güncelle
                stats = newStats;
                storage.setStats(stats);
                updateUI();
            } catch (err) {
                alert('Hata: ' + err.message);
            }
        };

        window.filterDay = (day) => {
            currentFilter = day;
            document.querySelectorAll('.day-tab').forEach(b => b.classList.toggle('tab-active', b.getAttribute('onclick').includes(`'${day}'`)));
            renderTable();
        };

        window.searchTable = () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = activities.filter(a => a.name.toLowerCase().includes(val) || a.lead.toLowerCase().includes(val));
            renderTable(filtered);
        };

        window.downloadPDF = () => {
            const element = document.getElementById('pdf-content');
            html2pdf().set({ margin: 10, filename: 'Digitopia_Bulut_Plan.pdf', jsPDF: { format: 'a4', orientation: 'landscape' } }).from(element).save();
        };
    </script>
</body>
</html>
